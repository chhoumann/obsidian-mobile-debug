name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (py${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
        include:
          # The tool's primary host is macOS (usbmux/AFC); one macOS leg
          # catches darwin-only breakage without 8 full jobs.
          - os: macos-latest
            python: "3.14"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv run --extra dev pytest -q
